services:
  wan-dns:
    build:
      context: .
      dockerfile: Dockerfile.wan-dns
    image: custos-wan-dns:latest
    container_name: custos-wan-dns
    networks:
      wan:
        ipv4_address: 172.30.0.20
        ipv6_address: fd00:30::20
      wan2:
        ipv4_address: 172.31.0.20
        ipv6_address: fd00:31::14

  filter:
    build: .
    image: custos:latest
    container_name: custos-filter
    privileged: true
    cap_add:
      - NET_ADMIN
    volumes:
      - ./lua:/app/lua
      - ./nft-rules:/app/nft-rules
      - ./tmp:/app/tmp
      - ./cfg:/app/cfg
      - ./cfg:/etc/custos
    profiles:
      - ndpi4
    networks:
      lan:
        ipv4_address: 172.28.0.254
        ipv6_address: fd00:28::fe
      wan:
        ipv4_address: 172.30.0.254
        ipv6_address: fd00:30::fe
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /app/tmp &&
        echo 1 > /proc/sys/net/ipv4/ip_forward &&
        echo 1 > /proc/sys/net/ipv4/conf/all/forwarding &&
        echo 1 > /proc/sys/net/ipv4/conf/default/forwarding &&
        echo 1 > /proc/sys/net/ipv6/conf/all/forwarding &&
        echo 0 > /proc/sys/net/ipv4/conf/all/rp_filter &&
        echo 0 > /proc/sys/net/ipv4/conf/default/rp_filter &&
        ip route del default 2>/dev/null || true &&
        ip route add default via 172.30.0.1 &&
        nft -f /app/nft-rules/dns-filter.nft &&
        nft add table ip nat &&
        nft add chain ip nat postrouting '{ type nat hook postrouting priority srcnat ; }' &&
        nft add rule ip nat postrouting th sport 53 return &&
        nft add rule ip nat postrouting masquerade &&
        nft add table ip6 nat &&
        nft add chain ip6 nat postrouting '{ type nat hook postrouting priority srcnat ; }' &&
        nft add rule ip6 nat postrouting th sport 53 return &&
        nft add rule ip6 nat postrouting masquerade &&
        export LUA_PATH='/app/lua/?.lua;/app/lua/?/init.lua;;' &&
        LAN_IF=$$(ip -o addr | awk '/172\.28\.0\.254/{print $$2}' | head -1) &&
        export BRIDGE_MODE=1 CAPTIVE_IP=172.28.0.254 BRIDGE_IFNAME="$${LAN_IF:-eth0}" &&
        exec luajit /app/lua/main.lua
    depends_on:
      - wan-dns

  filter-ndpi5:
    build:
      context: .
      dockerfile: Dockerfile.ndpi5
    image: custos:ndpi5
    container_name: custos-filter-ndpi5
    privileged: true
    cap_add:
      - NET_ADMIN
    volumes:
      - ./lua:/app/lua
      - ./nft-rules:/app/nft-rules
      - ./tmp:/app/tmp
      - ./cfg:/app/cfg
      - ./cfg:/etc/custos
    profiles:
      - ndpi5
    networks:
      lan:
        ipv4_address: 172.28.0.253
        ipv6_address: fd00:28::fd
      wan:
        ipv4_address: 172.30.0.253
        ipv6_address: fd00:30::fd
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /app/tmp &&
        echo 1 > /proc/sys/net/ipv4/ip_forward &&
        echo 1 > /proc/sys/net/ipv4/conf/all/forwarding &&
        echo 1 > /proc/sys/net/ipv4/conf/default/forwarding &&
        echo 1 > /proc/sys/net/ipv6/conf/all/forwarding &&
        echo 0 > /proc/sys/net/ipv4/conf/all/rp_filter &&
        echo 0 > /proc/sys/net/ipv4/conf/default/rp_filter &&
        ip route del default 2>/dev/null || true &&
        ip route add default via 172.30.0.1 &&
        nft -f /app/nft-rules/dns-filter.nft &&
        nft add table ip nat &&
        nft add chain ip nat postrouting '{ type nat hook postrouting priority srcnat ; }' &&
        nft add rule ip nat postrouting th sport 53 return &&
        nft add rule ip nat postrouting masquerade &&
        nft add table ip6 nat &&
        nft add chain ip6 nat postrouting '{ type nat hook postrouting priority srcnat ; }' &&
        nft add rule ip6 nat postrouting th sport 53 return &&
        nft add rule ip6 nat postrouting masquerade &&
        export LUA_PATH='/app/lua/?.lua;/app/lua/?/init.lua;;' &&
        LAN_IF=$$(ip -o addr | awk '/172\.28\.0\.253/{print $$2}' | head -1) &&
        export BRIDGE_MODE=1 CAPTIVE_IP=172.28.0.253 BRIDGE_IFNAME="$${LAN_IF:-eth0}" &&
        exec luajit /app/lua/main.lua
    depends_on:
      - wan-dns

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    image: custos-client:latest
    container_name: custos-client
    cap_add:
      - NET_ADMIN
      - NET_RAW
    profiles:
      - ndpi4
      - ndpi5
    networks:
      lan:
        ipv4_address: 172.28.0.10
        ipv6_address: fd00:28::a
    command:
      sh -c "echo nameserver 172.30.0.20 > /etc/resolv.conf; ip route del default 2>/dev/null; for i in 1 2 3; do for gw in 172.28.0.254 172.28.0.253; do ping -c1 -W2 $$gw >/dev/null 2>&1 && { ip route add default via $$gw 2>/dev/null; if [ $$gw = 172.28.0.254 ]; then ip -6 route replace default via fd00:28::fe 2>/dev/null || true; else ip -6 route replace default via fd00:28::fd 2>/dev/null || true; fi; break 2; }; done; sleep 2; done; sleep infinity"
    depends_on:
      - wan-dns

  client2:
    image: custos-client:latest
    container_name: custos-client2
    cap_add:
      - NET_ADMIN
      - NET_RAW
    profiles:
      - ndpi4
      - ndpi5
    networks:
      lan:
        ipv4_address: 172.28.0.11
        ipv6_address: fd00:28::b
    command:
      sh -c "echo nameserver 172.30.0.20 > /etc/resolv.conf; ip route del default 2>/dev/null; for i in 1 2 3; do for gw in 172.28.0.254 172.28.0.253; do ping -c1 -W2 $$gw >/dev/null 2>&1 && { ip route add default via $$gw 2>/dev/null; if [ $$gw = 172.28.0.254 ]; then ip -6 route replace default via fd00:28::fe 2>/dev/null || true; else ip -6 route replace default via fd00:28::fd 2>/dev/null || true; fi; break 2; }; done; sleep 2; done; sleep infinity"
    depends_on:
      - wan-dns

  # ── Mode bridge : filter-bridge + clients bridge ──────────────────────────
  # Le filtre agit comme un pont L2 entre br-lan2 (LAN clients) et br-wan2 (WAN).
  # BRIDGE_MODE=1 : NFQUEUE reçoit des trames Ethernet complètes, worker Q2 actif.
  # dns-filter-bridge.nft remplace dns-filter.nft (table bridge au lieu de table ip).
  filter-bridge:
    build: .
    image: custos:latest
    container_name: custos-filter-bridge
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE
    volumes:
      - ./lua:/app/lua
      - ./nft-rules:/app/nft-rules
      - ./tmp:/app/tmp
      - ./cfg:/app/cfg
      - ./cfg:/etc/custos
    profiles:
      - bridge
    networks:
      lan2:
        ipv4_address: 172.29.0.254
        ipv6_address: fd00:29::fe
      wan2:
        ipv4_address: 172.31.0.254
        ipv6_address: fd00:31::fe
    environment:
      BRIDGE_MODE: "1"
      BRIDGE_IFNAME: "eth0"
      CAPTIVE_IP: "172.29.0.254"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mkdir -p /app/tmp
        echo 1 > /proc/sys/net/ipv4/ip_forward
        echo 1 > /proc/sys/net/ipv6/conf/all/forwarding
        n=0; while true; do ip addr | grep -q '172.29.0.254' && break; sleep 0.3; n=$$((n+1)); [ "$$n" -gt 20 ] && break; done
        LAN_IF=$$(ip -o addr | awk '/172.29.0.254/{print $$2}')
        WAN_IF=$$(ip -o addr | awk '/172.31.0.254/{print $$2}')
        echo "LAN=$$LAN_IF WAN=$$WAN_IF"
        ip route del default 2>/dev/null || true
        ip route add default via 172.31.0.1 dev "$$WAN_IF" 2>/dev/null || true
        nft -f /app/nft-rules/dns-filter-docker-bridge.nft
        dnsmasq --no-daemon --conf-file=/dev/null \
          --server=172.31.0.20 \
          --listen-address=172.29.0.254 --listen-address=127.0.0.1 \
          --bind-interfaces --no-hosts --no-resolv \
          --log-queries=extra --log-facility=- &
        export LUA_PATH='/app/lua/?.lua;/app/lua/?/init.lua;;'
        export BRIDGE_MODE=1 BRIDGE_IFNAME="$${LAN_IF:-eth0}" CAPTIVE_IP=172.29.0.254
        exec luajit /app/lua/main.lua
    depends_on:
      - wan-dns

  client-bridge:
    image: custos-client:latest
    container_name: custos-client-bridge
    cap_add:
      - NET_ADMIN
      - NET_RAW
    profiles:
      - bridge
    networks:
      lan2:
        ipv4_address: 172.29.0.10
        ipv6_address: fd00:29::a
    command:
      sh -c "echo nameserver 172.29.0.254 > /etc/resolv.conf; ip route del default 2>/dev/null; for i in 1 2 3; do ping -c1 -W2 172.29.0.254 >/dev/null 2>&1 && { ip route add default via 172.29.0.254 2>/dev/null; ip -6 route replace default via fd00:29::fe 2>/dev/null || true; break; }; sleep 2; done; sleep infinity"
    depends_on:
      - wan-dns

  client-bridge2:
    image: custos-client:latest
    container_name: custos-client-bridge2
    cap_add:
      - NET_ADMIN
      - NET_RAW
    profiles:
      - bridge
    networks:
      lan2:
        ipv4_address: 172.29.0.11
        ipv6_address: fd00:29::b
    command:
      sh -c "echo nameserver 172.29.0.254 > /etc/resolv.conf; ip route del default 2>/dev/null; for i in 1 2 3; do ping -c1 -W2 172.29.0.254 >/dev/null 2>&1 && { ip route add default via 172.29.0.254 2>/dev/null; ip -6 route replace default via fd00:29::fe 2>/dev/null || true; break; }; sleep 2; done; sleep infinity"
    depends_on:
      - wan-dns

networks:
  lan:
    driver: bridge
    internal: true   # LAN isolé : pas de masquerade Docker hôte, routing WAN via le filtre
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.28.0.0/24
        - subnet: fd00:28::/64
  wan:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.30.0.0/24
        - subnet: fd00:30::/64
  lan2:
    driver: bridge
    internal: true
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.29.0.0/24
        - subnet: fd00:29::/64
  wan2:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.31.0.0/24
        - subnet: fd00:31::/64
