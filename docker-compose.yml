services:
  wan-dns:
    image: alpine:latest
    container_name: custos-wan-dns
    networks:
      lan:
        ipv4_address: 172.28.0.20
    command: >
      sh -c "apk add --no-cache dnsmasq bind-tools &&
             dnsmasq -k --port=53 --log-queries --server=8.8.8.8 --server=1.1.1.1"

  filter:
    build: .
    image: custos:latest
    container_name: custos-filter
    privileged: true
    cap_add:
      - NET_ADMIN
    volumes:
      - ./lua:/app/lua
      - ./nft-rules:/app/nft-rules
    profiles:
      - ndpi4
    networks:
      lan:
        ipv4_address: 172.28.0.254
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        nft -f /app/nft-rules/dns-filter-docker.nft &&
        export LUA_PATH='/app/lua/?.lua;/app/lua/?/init.lua;;' &&
        luajit /app/lua/main.lua &
        sleep 2 &&
        exec dnsmasq -k --interface=eth0 --listen-address=172.28.0.254 --port=53 --server=172.28.0.20 --no-resolv --log-queries
    depends_on:
      - wan-dns

  filter-ndpi5:
    build:
      context: .
      dockerfile: Dockerfile.ndpi5
    image: custos:ndpi5
    container_name: custos-filter-ndpi5
    privileged: true
    cap_add:
      - NET_ADMIN
    volumes:
      - ./lua:/app/lua
      - ./nft-rules:/app/nft-rules
    profiles:
      - ndpi5
    networks:
      lan:
        ipv4_address: 172.28.0.254
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        nft -f /app/nft-rules/dns-filter-docker.nft &&
        export LUA_PATH='/app/lua/?.lua;/app/lua/?/init.lua;;' &&
        luajit /app/lua/main.lua &
        sleep 2 &&
        exec dnsmasq -k --interface=eth0 --listen-address=172.28.0.254 --port=53 --server=172.28.0.20 --no-resolv --log-queries
    depends_on:
      - wan-dns

  client:
    image: alpine:latest
    container_name: custos-client
    networks:
      lan:
        ipv4_address: 172.28.0.10
    command: >
      sh -c "apk add --no-cache bind-tools && sleep infinity"
    depends_on:
      - filter

networks:
  lan:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
